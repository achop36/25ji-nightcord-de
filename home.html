<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>25:00 / Nightcord_OS // Deep_Dive</title>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Noto+Sans+TC:wght@500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --nigo-purple: #a29bfe;
            --nigo-cyan: #81ecec; /* 新增青色用於故障效果 */
            --nigo-dark: #1e1e2e;
            --nigo-border: #3a3a50;
            --text-glow: 0 0 8px var(--nigo-purple);
        }

        * { box-sizing: border-box; cursor: none; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden; perspective: 1200px;
        }

        #cursor {
            position: fixed; width: 22px; height: 22px;
            border: 2px solid var(--nigo-purple); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 999;
            box-shadow: 0 0 15px var(--nigo-purple); transition: transform 0.1s ease-out;
            mix-blend-mode: screen;
        }

        /* --- 背景層級 --- */
        #bg-static {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('bg-main.jpg') no-repeat center center / cover;
            z-index: -20; filter: brightness(0.45) blur(1px);
        }
        .crt-lines {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px, transparent 2px, transparent 4px);
            z-index: -18; pointer-events: none;
        }

        /* --- 數位特效層 --- */
        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -15; opacity: 0.6; pointer-events: none; } /* 透明度降低 */
        
        /* 左上角系統日誌 */
        #code-rain {
            position: fixed; top: 30px; left: 30px;
            font-family: 'Share Tech Mono', monospace; font-size: 1.0rem;
            color: var(--nigo-purple); opacity: 0.8; z-index: -10;
            text-shadow: var(--text-glow); pointer-events: none; line-height: 1.5;
        }

        /* 隨機浮現的 25時 代碼 (CRT 特效) */
        .random-code {
            position: fixed; font-family: 'Share Tech Mono', monospace;
            color: #ffffff; font-size: 1.1rem;
            pointer-events: none; z-index: -5; opacity: 0;
            /* 故障色散陰影 */
            text-shadow: 2px 0 1px var(--nigo-purple), -2px 0 1px var(--nigo-cyan);
            /* 應用新的 CRT 動畫 */
            animation: crt-appear 4s forwards ease-out;
        }

        /* 新增：CRT 顯像管開關機特效動畫 */
        @keyframes crt-appear {
            0% { opacity: 0; transform: scaleX(0.1) scaleY(0.1); filter: blur(5px); }
            5% { opacity: 1; transform: scaleX(1.5) scaleY(0.2); filter: blur(0px); color: var(--nigo-cyan);} /* 瞬間閃光拉伸 */
            10% { transform: scaleX(1) scaleY(1); color: #fff; }
            /* 持續閃爍 */
            12% { opacity: 0.8; } 14% { opacity: 1; }
            80% { opacity: 1; transform: scaleX(1) scaleY(1); filter: blur(0.5px); }
            /* 關機消失 */
            100% { opacity: 0; transform: scaleX(2) scaleY(0.05); filter: blur(8px); color: var(--nigo-purple); }
        }

        /* --- 漂浮成員 --- */
        .char-float {
            position: absolute; width: 280px; z-index: -16; opacity: 0.55;
            filter: drop-shadow(0 0 20px rgba(162, 155, 254, 0.3));
            animation: float 8s ease-in-out infinite;
        }
        .c1 { top: 8%; left: 8%; } .c2 { bottom: 8%; left: 14%; animation-delay: 2s; }
        .c3 { top: 12%; right: 10%; animation-delay: 4s; } .c4 { bottom: 10%; right: 6%; animation-delay: 6s; }
        @keyframes float { 0%,100% {transform:translateY(0) rotate(0deg);} 50% {transform:translateY(-25px) rotate(2deg);} }

        /* --- Nightcord 視窗 --- */
        .nc-window {
            position: absolute; top: 50%; left: 50%; width: 520px;
            background: rgba(25, 25, 35, 0.96); border: 1px solid var(--nigo-border);
            border-radius: 4px; transform: translate(-50%, -50%); transform-style: preserve-3d;
            box-shadow: 0 0 120px rgba(162, 155, 254, 0.5), 0 0 40px rgba(0,0,0,0.6) inset;
            z-index: 50; transition: transform 0.1s ease-out;
        }

        .nc-header {
            padding: 10px 18px; background: linear-gradient(to right, #252535, #151525);
            border-bottom: 1px solid var(--nigo-border);
            font-family: 'DotGothic16', sans-serif; font-size: 1.1rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nc-controls { display: flex; gap: 8px; }
        .win-btn { width: 12px; height: 12px; border-radius: 50%; background: #444; }
        .win-close { background: #ff5f56; }

        .nc-body { padding: 25px 35px; display: flex; flex-direction: column; gap: 15px; }

        .nc-link {
            text-decoration: none; color: #fff; padding: 12px 20px;
            background: rgba(255,255,255,0.03); border: 1px solid transparent;
            display: flex; flex-direction: column; transition: 0.3s; position: relative; overflow: hidden;
        }
        .nc-link::before {
            content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
            background: linear-gradient(90deg, transparent, rgba(162,155,254,0.2), transparent); transition:0.5s;
        }
        .nc-link:hover {
            border-color: var(--nigo-purple); background: rgba(162, 155, 254, 0.12);
            box-shadow: var(--text-glow); transform: translateX(8px);
        }
        .nc-link:hover::before { left:100%; }
        .cn-text { font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 2px; }
        .jp-text { font-size: 0.65rem; color: var(--nigo-purple); letter-spacing: 2px; opacity: 0.8; }

        .nc-status {
            padding: 6px 15px; background: #151525; border-top: 1px solid var(--nigo-border);
            font-family: 'Share Tech Mono'; font-size: 0.7rem; color: #666;
            display: flex; justify-content: space-between;
        }
    </style>
</head>
<body onclick="initAudio()">

    <div id="bg-static"></div>
    <div class="crt-lines"></div>
    <canvas id="particle-canvas"></canvas>
    <div id="code-rain"></div>
    <div id="cursor"></div>

    <img src="chr_tl_17.webp" class="char-float c1"><img src="chr_tl_18.webp" class="char-float c2">
    <img src="chr_tl_19.webp" class="char-float c3"><img src="chr_tl_20.webp" class="char-float c4">

    <div class="nc-window" id="main-window">
        <div class="nc-header">
            <span>25:00、ナイトコードで。</span>
            <div class="nc-controls"><div class="win-btn"></div><div class="win-btn"></div><div class="win-btn win-close"></div></div>
        </div>
        <div class="nc-body">
            <a href="about.html" class="nc-link"><span class="cn-text">成員檔案</span><span class="jp-text">MEMBER PROFILES</span></a>
            <a href="theater.html?v=20260131" class="nc-link"><span class="cn-text">深夜放映</span><span class="jp-text">MIDNIGHT THEATER</span></a>
            <a href="manga.html" class="nc-link"><span class="cn-text">記憶碎片</span><span class="jp-text">MEMORY FRAGMENTS</span></a>
        </div>
        <div class="nc-status">
            <span>STATUS: CONNECTED</span><span>USER: MASTER // 25-JI SYSTEM</span>
        </div>
    </div>

    <audio id="bgm" loop><source src="background music.mp3" type="audio/mpeg"></audio>

    <script>
        const win = document.getElementById('main-window');
        const cursor = document.getElementById('cursor');
        const bgm = document.getElementById('bgm');

        document.addEventListener('mousemove', (e) => {
            const x = e.clientX; const y = e.clientY;
            cursor.style.left = x + 'px'; cursor.style.top = y + 'px';
            const dx = x - window.innerWidth / 2; const dy = y - window.innerHeight / 2;
            win.style.transform = `translate(-50%, -50%) rotateX(${-dy / 45}deg) rotateY(${dx / 45}deg)`;
        });

        // 2. 精緻化多邊形碎片系統 (少一點，小一點)
        const cvs = document.getElementById('particle-canvas'); const ctx = cvs.getContext('2d');
        let w, h; resize(); window.addEventListener('resize', resize);
        function resize() { w = cvs.width = window.innerWidth; h = cvs.height = window.innerHeight; }
        
        const colors = ['rgba(162, 155, 254, ', 'rgba(120, 120, 130, ', 'rgba(30, 30, 40, '];

        class PolyParticle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.sizeBase = Math.random() * 8 + 3; // 變小：基礎大小 3-11px
                this.vx = (Math.random() - 0.5) * 0.4; this.vy = (Math.random() - 0.5) * 0.4;
                this.alpha = Math.random() * 0.4 + 0.1; // 透明度稍微降低
                this.colorBase = colors[Math.floor(Math.random() * colors.length)];
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.015;
                this.vertices = [];
                const sides = Math.floor(Math.random() * 3) + 3;
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2;
                    const r = this.sizeBase * (0.7 + Math.random() * 0.5);
                    this.vertices.push({x: Math.cos(angle) * r, y: Math.sin(angle) * r});
                }
            }
            update() {
                this.x += this.vx; this.y += this.vy; this.rotation += this.rotSpeed;
                if (this.x < -50 || this.x > w + 50 || this.y < -50 || this.y > h + 50) this.reset();
            }
            draw() {
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation);
                ctx.fillStyle = this.colorBase + this.alpha + ')';
                ctx.beginPath(); ctx.moveTo(this.vertices[0].x, this.vertices[0].y);
                for (let i = 1; i < this.vertices.length; i++) ctx.lineTo(this.vertices[i].x, this.vertices[i].y);
                ctx.closePath(); ctx.fill(); ctx.restore();
            }
        }
        // 數量減少到 60
        const parts = Array(60).fill().map(() => new PolyParticle());
        function ani() { ctx.clearRect(0,0,w,h); parts.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(ani); }
        ani();

        // 3. 隨機浮現 25時 相關代碼 (CRT 特效)
        const codePhrases = [
            '25時、ナイトコードで。', '誰もいないセカイ', '救いなんてない？',
            '消えたい...', 'composing_untitled.song', 'ERROR://心/找不到',
            'lyrics_draft.txt', 'K: まだ起きてる？', 'M: ...うん',
            'K: 曲、書けたよ。', 'system.load(untitled.song)',
            'M: ...わかんない。', 'ERROR:404_HEART_NOT_FOUND',
            'E: これ、どうかな？', 'loading_lyrics_data...',
            'A: ボクも行くよ！', 'kernel_panic:too_many_memories',
            'K: 消えないで。', 'render_sekai_objects()',
            'M: ...冷たいね。', 'git_commit:"missing_lyrics',
            'E: 明日が来ちゃう。', 'save_project:"untitled.00',
            'A: ニーゴにいたい。', 'audio_buffer_overflow_25',
            'K: 誰かを救いたい。', 'fetch_lost_melody_process',
            'M: ...温かいの？', 'status:trapped_in_sekai',
            'E: 認めてほしい。', 'executing_redemption_v1',
            'A: 秘密、守ってね。', 'project_sekai',
            'finding_harmony...', '> 接続中 <', '悔やむと書いてミライ'
        ];
        function spawnCode() {
            const el = document.createElement('div');
            el.className = 'random-code';
            el.innerText = codePhrases[Math.floor(Math.random() * codePhrases.length)];
            el.style.left = Math.random() * 80 + 5 + 'vw';
            el.style.top = Math.random() * 80 + 5 + 'vh';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000); // 與動畫時長匹配
        }
        setInterval(spawnCode, 1500); // 頻率稍微降低，更具隨機感

        // 4. 左上角系統日誌 (25時內容)
        const codeBox = document.getElementById('code-rain');
        const logs = [
            '[SYS] Connecting to N25 server...', '[USR] KANADE joined channel',
            '[MSG] MAFUYU: ...read', '[SYS] Analyzing audio spectrum',
            '[WRN] Low vitality detected', '[LOG] Saving project "Untitled"',
            '[SYS] MIZUKI sent an image', '[SYS] ENA is typing...',
            '> Loading empty_sekai.dat'
        ];
        setInterval(() => {
            const line = document.createElement('div'); line.innerText = '> ' + logs[Math.floor(Math.random() * logs.length)];
            codeBox.appendChild(line); if (codeBox.children.length > 7) codeBox.removeChild(codeBox.firstChild);
        }, 1800);

        function initAudio() { bgm.play().catch(()=>{}); }
    </script>
</body>
</html>
