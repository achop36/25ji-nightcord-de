<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Nightcord Theater / 25:00</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Noto+Sans+TC:wght@300;400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #a29bfe; }
        
        /* 基礎設置 - 強制背景為黑 */
        html, body { margin: 0; padding: 0; background: #000 !important; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; }

        /* --- 核心：全螢幕背景切換層 --- */
        #main-bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
            background: rgba(5, 5, 10, 0.94) url('bg-main.jpg?v=99') center/cover no-repeat fixed;
            transition: all 1s ease;
        }
        /* 黑夜模式：強制覆蓋紫色，切換為極黑 */
        body.night-mode-active #main-bg-layer {
            background: #010005 !important;
            background-image: radial-gradient(circle at center, rgba(20, 0, 45, 0.4) 0%, transparent 100%) !important;
        }

        /* --- 繁星層 (JS生成) --- */
        #star-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0; transition: 1.2s; }
        body.night-mode-active #star-container { opacity: 1; }
        .star { position: absolute; background: #fff; border-radius: 50%; }

        /* --- 25時隊標：影片上方的虛影 --- */
        #night-logo-phantom {
            position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
            width: 80px; opacity: 0; z-index: 2; pointer-events: none;
            filter: blur(15px) brightness(0.6); transition: 1.5s;
        }
        body.night-mode-active #night-logo-phantom {
            opacity: 0.25; filter: blur(5px) brightness(1.2) drop-shadow(0 0 10px var(--primary));
        }

        /* 內容容器 */
        .container { position: relative; z-index: 100; max-width: 1000px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 80px; }
        .back-link { font-family: 'Rubik Glitch'; color: #444; text-decoration: none; border: 1px solid #222; padding: 8px 20px; background: rgba(0,0,0,0.5); transition: 0.3s; }
        #night-mode-btn { font-family: 'Rubik Glitch'; color: var(--primary); background: rgba(20, 20, 35, 0.7); border: 1px solid var(--primary); padding: 10px 20px; cursor: pointer; }

        h1 { font-family: 'Rubik Glitch'; font-size: 3rem; color: #eee; margin-bottom: 120px; letter-spacing: 10px; }
        .video-wrapper { position: relative; display: inline-block; width: 100%; }
        .video-card { background: rgba(10, 10, 25, 0.85); border: 1px solid rgba(162, 155, 254, 0.1); padding: 10px; border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,1); backdrop-filter: blur(10px); }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; background: #000; overflow: hidden; }
        .video-container video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* 特效層 */
        #standard-effects { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; transition: 0.8s; }
        body.night-mode-active #standard-effects { opacity: 0; visibility: hidden; }
        .ghost-member { position: fixed; background-size: contain; background-repeat: no-repeat; opacity: 0; filter: blur(8px); transition: 2s; }
        .ghost-code { position: absolute; font-family: 'Share Tech Mono'; color: #fff; text-shadow: 0 0 10px var(--primary); }
        footer { margin-top: 80px; font-size: 0.7rem; color: #333; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div id="main-bg-layer"></div>
    <div id="star-container"></div>
    <div id="standard-effects">
        <div id="particles"></div>
        <div id="ghost-layer"></div>
        <div id="code-layer"></div>
    </div>

    <div class="container">
        <div class="header-bar">
            <a href="home.html" class="back-link">← EXIT ARCHIVE</a>
            <button id="night-mode-btn">🌙 ENTER DARKNESS</button>
        </div>
        <h1>THEATER 25:00</h1>
        <div class="video-wrapper">
            <img id="night-logo-phantom" src="logo-2500.png?v=99" alt="Logo">
            <div class="video-card">
                <div class="video-container">
                    <video id="main-video" controls src="pjsk-mv.mp4" poster="bg-main.jpg"></video>
                </div>
            </div>
        </div>
        <footer>SYSTEM_VOID_FIXED // 2026 / poi~</footer>
    </div>

    <audio id="bgm" loop><source src="background music.mp3" type="audio/mpeg"></audio>

    <script>
        const audio = document.getElementById('bgm');
        const video = document.getElementById('main-video');
        const nightBtn = document.getElementById('night-mode-btn');

        // 1. 生成繁星
        function createStars() {
            const field = document.getElementById('star-container');
            field.innerHTML = '';
            for (let i = 0; i < 200; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const size = Math.random() * 2.5;
                s.style.width = s.style.height = size + 'px';
                s.style.left = Math.random() * 100 + 'vw';
                s.style.top = Math.random() * 100 + 'vh';
                s.style.opacity = Math.random();
                field.appendChild(s);
            }
        }
        createStars();

        // 2. 音量襯托 (鎖定 0.02)
        let fIn;
        function fadeIn() {
            clearInterval(fIn); audio.play();
            fIn = setInterval(() => { if (audio.volume < 0.02) audio.volume += 0.001; else clearInterval(fIn); }, 200);
        }
        function fadeOut() {
            clearInterval(fIn);
            fIn = setInterval(() => { if (audio.volume > 0.002) audio.volume -= 0.002; else { clearInterval(fIn); audio.pause(); } }, 50);
        }
        video.onplay = fadeOut; video.onpause = fadeIn; video.onended = fadeIn;

        // 3. 切換
        nightBtn.onclick = () => {
            document.body.classList.toggle('night-mode-active');
            const isNight = document.body.classList.contains('night-mode-active');
            nightBtn.innerText = isNight ? "☀ RETURN TO LIGHT" : "🌙 ENTER DARKNESS";
            if(isNight) createStars();
        };

        // 4. 特效 (成員、代碼)
        const members = ['chr_tl_17.webp', 'chr_tl_18.webp', 'chr_tl_19.webp', 'chr_tl_20.webp'];
        function spawnGhost() {
            if (document.body.classList.contains('night-mode-active')) return;
            const g = document.createElement('div');
            g.className = 'ghost-member';
            g.style.backgroundImage = `url('${members[Math.floor(Math.random()*4)]}')`;
            g.style.width = g.style.height = '350px';
            g.style.left = Math.random()*70+'vw'; g.style.top = Math.random()*70+'vh';
            document.getElementById('ghost-layer').appendChild(g);
            setTimeout(() => g.style.opacity = '0.12', 100);
            setTimeout(() => { g.style.opacity = '0'; setTimeout(()=>g.remove(), 2000); }, 5000);
        }

        window.onload = () => {
            audio.volume = 0; fadeIn();
            setInterval(spawnGhost, 10000);
        };
    </script>
</body>
</html>
